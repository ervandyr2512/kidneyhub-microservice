{{error}}
<form method="POST" action="/register">
  <div class="form-group">
    <label class="form-label" for="username">Username</label>
    <input type="text" id="username" name="username" class="form-input" placeholder="Masukkan username" required minlength="3" maxlength="50" autocomplete="username">
    <p class="form-hint">Minimal 3 karakter</p>
  </div>
  <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required minlength="6" autocomplete="new-password">
    <p class="form-hint">Minimal 6 karakter</p>
  </div>
  <div class="form-group">
    <label class="form-label" for="confirm_password">Konfirmasi Password</label>
    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="••••••••" required minlength="6" autocomplete="new-password">
  </div>
  <button type="submit" class="btn btn-primary btn-full">Daftar</button>
</form>
